<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Market Empire | Random Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">SILICON<span>.</span></div>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>

        <nav class="nav-menu">
            <button class="nav-btn active" id="btn-factory" onclick="openTab('factory')"><i>🏭</i> Линия</button>
            <button class="nav-btn" id="btn-warehouse" onclick="openTab('warehouse')"><i>📦</i> Склад</button>
            <button class="nav-btn" id="btn-mining" onclick="openTab('mining')"><i>⚡</i> Ферма</button>
            <button class="nav-btn" id="btn-shop" onclick="openTab('shop')"><i>🛒</i> Магазин</button>
            <button class="nav-btn" id="btn-index" onclick="openTab('index')"><i>📖</i> Индекс</button>
        </nav>

        <div class="balance-card">
            <span>Ваш баланс</span>
            <h2 id="money-display">$0</h2>
            <div class="income-rate">+$<span id="mining-rate">0</span>/с</div>
        </div>
    </aside>

    <main class="main-view">
        <section id="factory" class="tab-content active">
            <div class="factory-container">
                <div class="conveyor-belt">
                    <div id="active-phone-card" class="phone-preview">
                        <div class="item-card">
                            <h3>Запуск системы...</h3>
                        </div>
                    </div>
                </div>

                <div class="progress-zone">
                    <div class="bar-container">
                        <div id="auto-progress-fill" class="bar-fill"><div class="laser"></div></div>
                    </div>
                    <div class="bar-info">
                        <span id="progress-percent">0%</span>
                        <span id="time-left">0.0s</span>
                    </div>
                </div>

                <div class="mini-stats">
                    <div class="ms-item">Собрано: <b id="stats-total-built">0</b></div>
                    <div class="ms-item">Скорость: <b id="speed-bonus">100%</b></div>
                </div>
            </div>
        </section>

        <section id="warehouse" class="tab-content">
            <div class="section-header"><h2>Ваш Склад</h2></div>
            <div class="grid" id="market-sell"></div>
        </section>

        <section id="mining" class="tab-content">
            <div class="section-header">
                <h2>Майнинг-ферма</h2>
                <span id="slots-count" class="slots-badge">0 / 10</span>
            </div>
            <div class="grid" id="mining-grid"></div>
        </section>

        <section id="shop" class="tab-content">
            <div class="section-header"><h2>Магазин улучшений</h2></div>
            <div class="grid" id="upgrades-list"></div>
        </section>

        <section id="index" class="tab-content">
            <div class="section-header">
                <h2>Индекс моделей</h2>
                <p>Статистика всех найденных устройств</p>
            </div>
            <div class="grid" id="index-grid"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
